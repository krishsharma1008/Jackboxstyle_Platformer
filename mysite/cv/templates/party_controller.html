<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>{{ player.name }} Controller - Draw Platformer</title>
    <link href="/static/css/party.css" rel="stylesheet">
</head>
<body class="controller-body">
    <main class="controller">
        <section class="controller-status">
            <div>
                <div class="party-kicker">Room {{ room.code }}</div>
                <h1 class="controller-name"><span class="swatch" style="background: {{ player.color }}"></span>{{ player.name }}</h1>
                <p class="controller-help">Hold left or right, tap jump. Keep this screen open.</p>
            </div>
            <strong id="connection" class="connection-pill disconnected">connecting</strong>
        </section>
        <section class="pad">
            <button class="control-button jump" aria-label="Jump" data-down="jump_down" data-up="jump_up">
                <span class="control-icon">↑</span>
                <span class="control-label">Jump</span>
            </button>
            <button class="control-button left" aria-label="Move left" data-down="left_down" data-up="left_up">
                <span class="control-icon">←</span>
            </button>
            <button class="control-button right" aria-label="Move right" data-down="right_down" data-up="right_up">
                <span class="control-icon">→</span>
            </button>
        </section>
        <button class="control-button reset" id="reset" aria-label="Reset to start">
            <span class="control-icon">↻</span>
            <span class="control-label">Reset</span>
        </button>

        <a class="party-button secondary phone-submit" href="{% url 'party_player_lobby' room.code player.id %}">Setup / Edit Map</a>
    </main>

    <script>
        var roomCode = "{{ room.code }}";
        var playerId = {{ player.id }};
        var token = "{{ token }}";
        var socketProtocol = window.location.protocol === "https:" ? "wss" : "ws";
        var socket = new WebSocket(socketProtocol + "://" + window.location.host + "/ws/party/" + roomCode + "/");
        var connection = document.getElementById("connection");

        function send(action) {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: "input", action: action }));
            }
        }

        socket.onopen = function () {
            connection.textContent = "connected";
            connection.className = "connection-pill connected";
            socket.send(JSON.stringify({ type: "player_join", player_id: playerId, token: token }));
        };

        socket.onclose = function () {
            connection.textContent = "disconnected";
            connection.className = "connection-pill disconnected";
        };

        document.querySelectorAll("[data-down]").forEach(function (button) {
            function down(event) {
                event.preventDefault();
                button.classList.add("active");
                send(button.dataset.down);
            }
            function up(event) {
                event.preventDefault();
                button.classList.remove("active");
                send(button.dataset.up);
            }
            button.addEventListener("touchstart", down, false);
            button.addEventListener("touchend", up, false);
            button.addEventListener("touchcancel", up, false);
            button.addEventListener("mousedown", down, false);
            button.addEventListener("mouseup", up, false);
            button.addEventListener("mouseleave", up, false);
        });

        document.getElementById("reset").addEventListener("click", function (event) {
            event.preventDefault();
            send("reset");
        });
    </script>
</body>
</html>
